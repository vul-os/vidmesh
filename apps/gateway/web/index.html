<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evermesh gateway</title>
    <meta name="description" content="Watch, publish, and verify video on a Evermesh gateway — signed and checkable in your browser." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAFBF7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0C0B" />
    <meta name="color-scheme" content="light dark" />
    <script>
      // Applied synchronously, before first paint, so there is no
      // flash of the wrong theme. Mirrors src/hooks/useTheme.ts, which
      // owns the toggle after mount; kept tiny and dependency-free on
      // purpose since it runs before any module has loaded.
      (function () {
        try {
          var stored = localStorage.getItem("evermesh:theme");
          var dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (_e) {
          /* localStorage/matchMedia unavailable: default to light. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
