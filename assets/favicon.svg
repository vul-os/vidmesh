<?xml version="1.0" encoding="UTF-8"?>
<!--
  Evermesh favicon: the mark alone, thickened so the silhouette (play
  triangle + three satellite mesh nodes) still reads at 16px. This is the
  original Vidmesh-era mark, restored after a brief cairn interlude under
  the "Boloka" name (see DECISIONS.md, 2026-07-23). The structure color
  follows the browser/OS scheme so the tab icon holds up on light and dark
  chrome; the signal-lime triangle is constant.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Evermesh">
  <title>Evermesh</title>
  <style>
    .structure { fill: #10140F; stroke: #10140F; }
    @media (prefers-color-scheme: dark) {
      .structure { fill: #E9F0EA; stroke: #E9F0EA; }
    }
  </style>
  <g class="structure" stroke-width="16" stroke-linecap="round">
    <path d="M84,72 L56,28" />
    <path d="M84,184 L56,228" />
    <path d="M190,128 L236,128" />
    <circle cx="56" cy="28" r="15" stroke="none" />
    <circle cx="56" cy="228" r="15" stroke="none" />
    <circle cx="236" cy="128" r="15" stroke="none" />
  </g>
  <path d="M80,64 L196,128 L80,192 Z" fill="#A8E01F" stroke="#A8E01F"
        stroke-width="24" stroke-linejoin="round" />
</svg>
